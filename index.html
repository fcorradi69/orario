<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calcolo orario giornaliero" />
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon" type="image/x-icon" href="images/orario.png" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Orario</title>
  </head>
  <body>
    <div id="app"></div>

    <script type="module" src="js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("service-worker.js")
            .then((response) => console.log("Service worker registered"))
            .catch((err) => console.log("service worker not registered"));
        });
      }

      if(navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().then(ispersistent => {
          if(ispersistent) {
            console.log("Storage will not be cleared except by explicit user action");
          } else {
            console.log("Storage may be cleared by the UA under storage pressure.");
          }
        });
      }
    </script>
  </body>
</html>
